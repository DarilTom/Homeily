{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden position-relative">
            
            <!-- Decorative honeycomb pattern header -->
            <div class="bg-primary-subtle p-4 pb-5 text-center position-relative">
                <i class="bi bi-hexagon-fill position-absolute text-white" style="font-size: 10rem; right: -30px; top: -30px; opacity: 0.3;"></i>
                
                <div class="position-relative z-1 mt-3">
                    <div class="bg-white d-inline-flex p-3 rounded-circle shadow-sm mb-3">
                        <i class="bi bi-person-fill-lock fs-2" style="color: var(--hc-primary);"></i>
                    </div>
                    <h2 class="fw-bold mb-0">Welcome Back</h2>
                    <p class="text-muted mt-1">Login to your Homeily account</p>
                </div>
            </div>
            
            <div class="card-body p-4 p-md-5 bg-white position-relative" style="margin-top: -20px; border-radius: 20px 20px 0 0;">
                
                <!-- Error Message Alert -->
                {% if error %}
                <div class="alert alert-danger rounded-3 d-flex align-items-center shadow-sm">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Username</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text bg-light border-0" style="border-right: 2px solid var(--hc-border) !important;">
                                <i class="bi bi-person text-dark"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-0 bg-light" placeholder="Enter your username" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text bg-light border-0" style="border-right: 2px solid var(--hc-border) !important;">
                                <i class="bi bi-lock text-dark"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-0 bg-light" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm fw-bold">
                            Login <i class="bi bi-box-arrow-in-right ms-1"></i>
                        </button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-muted mb-0">Don't have an account? <a href="/register/" class="text-primary fw-bold text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
