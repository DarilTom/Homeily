{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden position-relative">
            
            <!-- Decorative honeycomb pattern header -->
            <div class="bg-primary-subtle p-4 pb-5 text-center position-relative">
                <!-- Shifted the hexagon to the left side for variety -->
                <i class="bi bi-hexagon-fill position-absolute text-white" style="font-size: 10rem; left: -30px; top: -30px; opacity: 0.3;"></i>
                
                <div class="position-relative z-1 mt-3">
                    <div class="bg-white d-inline-flex p-3 rounded-circle shadow-sm mb-3">
                        <i class="bi bi-person-plus-fill fs-2" style="color: var(--hc-primary);"></i>
                    </div>
                    <h2 class="fw-bold mb-0">Create an Account</h2>
                    <p class="text-muted mt-1">Join Homeily today</p>
                </div>
            </div>
            
            <div class="card-body p-4 p-md-5 bg-white position-relative" style="margin-top: -20px; border-radius: 20px 20px 0 0;">
                
                <!-- Error Message Alert -->
                {% if error %}
                <div class="alert alert-danger rounded-3 d-flex align-items-center shadow-sm">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" name="first_name" class="form-control bg-light border-0" placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control bg-light border-0" placeholder="Choose a username" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control bg-light border-0" placeholder="john@example.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="text" name="phone" class="form-control bg-light border-0" placeholder="+1 (555) 000-0000" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Home Address (Service Location)</label>
                        <textarea name="address" class="form-control bg-light border-0" rows="2" placeholder="123 Main St, Apt 4B, City, ZIP" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <div class="input-group shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text bg-light border-0" style="border-right: 2px solid var(--hc-border) !important;">
                                <i class="bi bi-shield-lock text-dark"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-0 bg-light" placeholder="Create a secure password" required>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm fw-bold">
                            Create Account <i class="bi bi-arrow-right-circle ms-1"></i>
                        </button>
                    </div>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-muted mb-0">Already have an account? <a href="/login/" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
